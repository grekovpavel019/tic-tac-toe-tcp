<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div id="registration-page" class="page page--center">
        <form action="" class="registration">
            <h1 class="registration__title">Регистрация</h1>
            <div class="registration__login">
                <label for="login">Введите логин</label>
                <input type="text" id="login" name="login">
            </div>
            <button id="registration__btn" class="registration__btn">Отправить</button>
        </form>
    </div>

    <div id="game-page" class="page page--full">
        <div class="game">
            <div class="game__sidebar">

                <div class="sidebar__header">
                    <span class="username">Anonym</span>
                    <h3>Подлкючен</h3>
                </div>

                <div class="sidebar__section">
                    <h2>Комнаты</h2>
                    <div class="section__buttons">
                        <button id="get-rooms" class="room-interact-btn">↻</button>
                        <button id="create-room" class="room-interact-btn">+ Создать</button>
                    </div>
                </div>

                <div id="room-list" class="sidebar__rooms">
                    
                </div>

                <div class="disconnect">
                    <button id="disconnect">Отключиться</button>
                </div>

            </div>

            <div class="main-area">
                <div id="no-room" class="no-room">
                    <h2>Выберите комнату</h2>
                    <p>Или создайте новую</p>
                </div>

                <div id="room-content" class="room-content">

                    <div id="game-area" class="game-area">
                        
                    </div>
                    
                    <div id="messenger__chat" class="messenger__chat">
                        <div id="chat__field" class="chat__field">
                        </div>
                        <form id="chat__input" class="chat__input">
                            <input id="messageInput" type="text">
                            <button id="messageSend" type="submit">Отправить</button>
                        </form>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div id="modal-bg" class="modal-bg">
        <div id="room-input" class="modal">
            <h2 class="modal__header">Введите название комнаты</h2>
            <input id="room-name-input" class="modal__input" type="text">
            <div class="modal__actions">
                <button id="entry" class="modal__entry">Войти</button>
                <button id="cancel" class="modal__cancel">Отменить</button>
            </div>
        </div>

        <div id="game-mode" class="modal">
            <h2 class="modal__header">Выберите режим</h2>
            <div class="modal__actions">
                <button id="player" class="modal__entry">Игрок</button>
                <button id="spectator" class="modal__entry">Наблюдатель</button>
            </div>
        </div>
    </div>

    <script src="index.js" defer></script>
</body>
</html>

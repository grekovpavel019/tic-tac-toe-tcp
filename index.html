<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div id="registration-page" class="page page--center">
        <form action="" class="registration">
            <h1 class="registration__title">Регистрация</h1>
            <div class="registration__login">
                <label for="login">Введите логин</label>
                <input type="text" id="login" name="login">
            </div>
            <button id="registration__btn" class="registration__btn">Отправить</button>
        </form>
    </div>

    <div id="messenger-page" class="page page--full">
        <div class="messenger">
            <div class="messenger__users">
                
            </div>

            <div id="messenger__chat" class="messenger__chat">
                <div id="chat__field" class="chat__field">
                </div>
                <form id="chat__input" class="chat__input">
                    <input id="messageInput" type="text">
                    <button id="messageSend" type="submit">Отправить</button>
                </form>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
